services:
  - type: web
    name: ai-dispatch-engine
    runtime: docker
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: API_KEYS
        generateValue: true          # Render auto-generates a secure value
      - key: FSM_WEBHOOK_SECRET
        generateValue: true
      - key: OPTIMIZATION_INTERVAL
        value: "30"
      - key: LOG_LEVEL
        value: INFO
      # Add these manually in the Render dashboard:
      # GOOGLE_MAPS_API_KEY
      # TWILIO_ACCOUNT_SID
      # TWILIO_AUTH_TOKEN
      # TWILIO_FROM_NUMBER
      # SENDGRID_API_KEY
